# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Binance Unit Test
      working-directory: ./binance
      run: go test -v ./...

    - name: OKX Unit Test
      working-directory: ./okx
      run: go test -v ./...

    - name: Bitfinex Unit Test
      working-directory: ./bitfinex
      run: go test -v ./...

    - name: MAX Unit Test
      working-directory: ./max
      run: go test -v ./...

    - name: Pionex Unit Test
      working-directory: ./pionex
      run: go test -v ./...

    - name: Manager Unit Test
      working-directory: ./manager
      run: go test -v ./...

    - name: CLI Build Test
      working-directory: ./cmd/ccy-cli
      run: go build -o ../../bin/ccy-cli -v ./...
